---
# Source: platform/charts/backend/templates/service.yaml
apiVersion: v1
kind: Service

metadata:
 name: backend-service

spec:
 selector:
   app: backend

 ports:
 - port: 3000
   targetPort: 3000
---
# Source: platform/charts/frontend/templates/service.yaml
apiVersion: v1
kind: Service

metadata:
 name: frontend-service

spec:
 type: NodePort

 selector:
   app: frontend

 ports:
 - port: 80
   targetPort: 80
   nodePort: 30080
---
# Source: platform/charts/backend/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend

spec:
  replicas: 3

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:

      - name: backend
        image: yourrepo/backend:v1::v1

        ports:
        - containerPort: 3000
---
# Source: platform/charts/frontend/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend

          image: yourrepo/frontend::v1

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: 100m
              memory: 128Mi

            limits:
              cpu: 300m
              memory: 256Mi
---
# Source: platform/charts/backend/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
spec:
  rules:
    - host: frontend.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
# Source: platform/charts/frontend/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
spec:
  rules:
    - host: frontend.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
