replicaCount: 2

image:
  repository: nginx
  tag: latest

service:
  type: ClusterIP
  port: 3000

env:
  NODE_ENV: "production"
  PORT: "3000"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: false

ingress:
  enabled: true
  host: backend.local

livenessProbe:
  path: /health

readinessProbe:
  path: /health
